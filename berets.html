    <style>
        .assets-stats {
            display: flex;
            gap: 32px;
            justify-content: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .asset-stat {
            text-align: center;
        }
        .asset-stat-value {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
        }
        .asset-stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #999;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Owner rank list */
        .owners-list {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .owner-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 14px;
            transition: all 0.2s ease;
            animation: fadeUp 0.4s ease both;
        }
        .owner-row:hover {
            border-color: #ddd;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .owner-rank {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #bbb;
            min-width: 24px;
            text-align: center;
            flex-shrink: 0;
        }
        .owner-pfp {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #eee;
            flex-shrink: 0;
            object-fit: cover;
        }
        .owner-info {
            flex: 1;
            min-width: 0;
        }
        .owner-handle {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: #222;
        }
        .owner-handle a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }
        .owner-handle a:hover {
            color: #1d9bf0;
        }
        .owner-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #999;
            margin-top: 2px;
        }
        .owner-badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .owner-dogs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .owner-dog-thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
            transition: all 0.2s ease;
            cursor: pointer;
            flex-shrink: 0;
        }
        .owner-dog-thumb:hover {
            transform: scale(1.1);
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .owner-dog-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }
        .owner-dog-thumb .dog-id {
            display: none;
        }

        /* Tooltip on hover */
        .owner-dog-thumb {
            position: relative;
        }
        .owner-dog-thumb:hover .dog-id {
            display: block;
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: #666;
            white-space: nowrap;
            background: #fff;
            padding: 1px 5px;
            border-radius: 4px;
            border: 1px solid #eee;
            z-index: 10;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            .owner-row {
                flex-wrap: wrap;
                gap: 12px;
                padding: 14px 16px;
            }
            .owner-pfp {
                width: 36px;
                height: 36px;
            }
            .owner-dogs {
                width: 100%;
                justify-content: flex-start;
                margin-top: 4px;
            }
            .owner-dog-thumb {
                width: 40px;
                height: 40px;
            }
            .owner-rank {
                min-width: 18px;
                font-size: 0.6rem;
            }
        }
    </style>

    <section class="page-header">

            <p class="page-desc">Berets are the face of Type.</p>

            <div class="assets-stats">
                <div class="asset-stat">
                    <span class="asset-stat-value" id="totalBerets">—</span>
                    <span class="asset-stat-label">Beret Dogs</span>
                </div>
                <div class="asset-stat">
                    <span class="asset-stat-value" id="totalHolders">—</span>

    <!-- Owner Rank Listing -->
    <section>
        <div class="owners-list" id="ownersList"></div>
    </section>

    <script src="berets-data.js"></script>
    <script>
        // Group berets by owner
        const ownerMap = {};
        BERETS.forEach(b => {
            if (!ownerMap[b.xHandle]) {
                ownerMap[b.xHandle] = {
                    xHandle: b.xHandle,
                    displayName: b.displayName,
                    avatarUrl: b.avatarUrl,
                    isTypeMember: b.isTypeMember,
                    dogs: []
                };
            }
            ownerMap[b.xHandle].dogs.push(b);
            // Use the first entry's avatar that has a real avatar (not a dog fallback)
            if (b.avatarUrl.includes('avatars/')) {
                ownerMap[b.xHandle].avatarUrl = b.avatarUrl;
            }
        });

        // Convert to array and sort by beret count (descending), then Type members first
        const owners = Object.values(ownerMap).sort((a, b) => {
            // Sort by count first
            const countDiff = b.dogs.length - a.dogs.length;
            if (countDiff !== 0) return countDiff;
            // Then Type members first
            if (a.isTypeMember !== b.isTypeMember) return a.isTypeMember ? -1 : 1;
            // Then alphabetical
            return a.xHandle.localeCompare(b.xHandle);
        });

        // Stats
        document.getElementById('totalBerets').textContent = BERETS.length;
        document.getElementById('totalHolders').textContent = owners.length;

        // Render owner rows
        const list = document.getElementById('ownersList');
        owners.forEach((owner, i) => {
            const row = document.createElement('div');
            row.className = 'owner-row';
            row.style.animationDelay = (i * 0.04) + 's';

            const badge = owner.isTypeMember ? '<img src="logo.jpg" alt="Type Media" class="owner-badge">' : '';
            const countLabel = owner.dogs.length === 1 ? '1 beret' : owner.dogs.length + ' berets';

            const dogsHTML = owner.dogs.map(d => {
                const marketUrl = 'https://market.doginaldogs.com/inscription/' + d.inscriptionId;
                return `<a href="${marketUrl}" target="_blank" rel="noopener" class="owner-dog-thumb" title="Dog #${d.dogId}">
                    <img src="https://market.doginaldogs.com/dogs/${d.dogId}.png" alt="#${d.dogId}" loading="lazy">
                    <span class="dog-id">#${d.dogId}</span>
                </a>`;
            }).join('');

            row.innerHTML = `
                <span class="owner-rank">${i + 1}</span>
                <img src="${owner.avatarUrl}" alt="${owner.displayName}" class="owner-pfp" onerror="this.src='https://market.doginaldogs.com/dogs/${owner.dogs[0].dogId}.png'">
                <div class="owner-info">
                    <div class="owner-handle"><a href="https://x.com/${owner.xHandle}" target="_blank">@${owner.xHandle}</a>${badge}</div>
                    <div class="owner-count">${countLabel}</div>
                </div>
                <div class="owner-dogs">${dogsHTML}</div>
            `;
            list.appendChild(row);
        });
    </script>
