    <style>
        .council-section {
            max-width: var(--max-w, 1140px);
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
        }
        .section-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 6px;
        }
        .section-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: #999;
            margin: 0;
        }
        .council-grid {
            display: flex !important;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            max-width: 900px;
            width: 100%;
            padding: 0 16px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        @media (max-width: 700px) {
            .council-grid {
                gap: 12px;
            }
        }
        .council-card {
            border: 2px solid #111 !important;
            position: relative;
            width: 80px;
            flex-shrink: 0;
        }
        @media (min-width: 500px) {
            .council-card { width: 90px; }
        }
        @media (min-width: 700px) {
            .council-card { width: 100px; }
        }
        .council-card .member-handle {
            font-size: 0.7rem;
            word-break: break-all;
            overflow-wrap: break-word;
            line-height: 1.2;
        }
        .council-card .member-avatar {
            width: 56px;
            height: 56px;
        }
        .council-card .member-avatar img {
            width: 56px;
            height: 56px;
            object-fit: cover;
        }
        .council-card:hover {
            border-color: #333 !important;
        }
        .member-role {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 600;
            color: #999;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Member cards clickable */
        .member-card { cursor: pointer; }

        /* ── Profile Modal ── */
        .profile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 20px;
        }
        .profile-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .profile-card {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 40px 32px 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            position: relative;
            transform: scale(0.95) translateY(10px);
            transition: transform 0.25s ease;
        }
        .profile-overlay.active .profile-card {
            transform: scale(1) translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #666;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 4px 8px;
            line-height: 1;
            transition: color 0.15s;
        }
        .modal-close:hover { color: #fff; }
        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 16px;
            display: block;
            border: 3px solid #222;
        }
        .modal-avatar-placeholder {
            background: #111;
            color: #666;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .modal-verified {
            flex-shrink: 0;
        }
        .modal-handle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 16px;
        }
        .modal-bio {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 20px;
            max-height: 120px;
            overflow-y: auto;
        }
        .modal-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
            padding: 16px 0;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
        }
        .modal-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .modal-stat-num {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }
        .modal-stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .modal-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 100px;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .modal-link:hover { opacity: 0.85; }
        .modal-socials {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .modal-social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #111;
            border: 1px solid #222;
            transition: transform 0.15s, border-color 0.15s;
            text-decoration: none;
        }
        .modal-social-icon:hover {
            transform: scale(1.12);
            border-color: #444;
        }
        .modal-social-icon svg {
            width: 18px;
            height: 18px;
        }

        @media (max-width: 400px) {
            .profile-card { padding: 32px 20px 24px; }
            .modal-avatar { width: 64px; height: 64px; }
            .modal-name { font-size: 1.2rem; }
        }
    </style>
